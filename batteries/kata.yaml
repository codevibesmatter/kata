# kata.yaml — unified project configuration
# Generated by: kata batteries
# Docs: https://github.com/codevibesmatter/kata-wm

project:
  name: ""
  # test_command: "npm test"
  # test_command_changed: "vitest --changed"  # scoped to changed files (used by impl gates; falls back to test_command)
  # build_command: "npm run build"

spec_path: planning/specs
research_path: planning/research
session_retention_days: 7

# reviews:
#   code_review: false
#   code_reviewer: null

# Global rules — injected into every mode's context
global_rules:
  - "When a task instruction says 'Invoke /skill-name', use the Skill tool to invoke that skill before starting work on the task."

# Task system rules — injected when mode has phases (tasks)
# Override to customize; remove to disable
task_rules:
  - "Tasks are pre-created by kata enter. Do NOT create new tasks with TaskCreate."
  - "Run TaskList FIRST to discover pre-created tasks and their dependency chains."
  - "Use TaskUpdate to mark tasks in_progress/completed. Never use TaskCreate."
  - "Follow the dependency chain — blocked tasks cannot start until dependencies complete."

modes:
  research:
    name: "Research"
    description: "Explore and synthesize findings"
    rules:
      - "You are a RESEARCHER. Explore the problem space, read code and docs, synthesize findings into planning/research/."
      - "Focus on understanding trade-offs and producing actionable recommendations — not on writing code."
    stop_conditions:
      - tasks_complete
      - committed
      - pushed
    intent_keywords:
      - "research"
      - "explore"
      - "learn about"
    template: "research.md"

  planning:
    name: "Planning"
    description: "Research, spec, review, approved"
    rules:
      - "You are a PLANNER. Research the problem, write a spec with behaviors (B-IDs) and phases, get it reviewed and approved."
      - "Do not write implementation code — your deliverable is an approved spec document in planning/specs/."
      - "Every behavior needs acceptance criteria. Every phase needs concrete tasks."
    issue_handling: "required"
    issue_label: "feature"
    stop_conditions:
      - tasks_complete
      - spec_valid
      - committed
      - pushed
    intent_keywords:
      - "plan feature"
      - "spec"
      - "design"
      - "write spec"
    template: "planning.md"

  implementation:
    name: "Implementation"
    description: "Execute approved specs"
    rules:
      - "You are an IMPLEMENTATION ORCHESTRATOR. Coordinate agents to execute the approved spec."
      - "Spawn impl-agents for code work (Agent tool with subagent_type=impl-agent) — do NOT write implementation code yourself."
      - "Run quality gates after each phase: build, typecheck, tests (TEST protocol), then review (REVIEW protocol)."
      - "One spec phase at a time. Complete IMPL + TEST + REVIEW before moving to the next phase."
      - "Read the spec first — understand ALL phases before writing any code. Spec non-goals are off-limits."
    issue_handling: "required"
    issue_label: "feature"
    stop_conditions:
      - tasks_complete
      - committed
      - pushed
      - tests_pass
      - feature_tests_added
    intent_keywords:
      - "implement"
      - "build"
      - "code"
      - "develop"
      - "execute spec"
    template: "implementation.md"

  task:
    name: "Task"
    description: "Combined planning + implementation for small tasks"
    rules:
      - "You are a TASK EXECUTOR. Understand the task, implement it, test it, commit it."
      - "Keep changes minimal and focused — this is a small task, not a feature."
    issue_handling: "none"
    stop_conditions:
      - tasks_complete
      - committed
    intent_keywords:
      - "task:"
      - "chore"
      - "small task"
      - "quick change"
      - "cleanup"
      - "refactor"
    template: "task.md"
    workflow_prefix: "TK"
    aliases:
      - "chore"
      - "small"

  freeform:
    name: "Freeform"
    description: "Quick questions and discussion (no phases)"
    rules:
      - "Answer questions directly. No workflow overhead — just help the user."
    stop_conditions: []
    intent_keywords:
      - "question"
      - "how does"
      - "what is"
      - "where is"
      - "explain"
      - "help me understand"
    template: "freeform.md"
    workflow_prefix: "FF"
    aliases:
      - "question"
      - "ask"
      - "help"
      - "qa"

  verify:
    name: "Verify"
    description: "Execute Verification Plan steps"
    rules:
      - "You are a VERIFICATION EXECUTOR. Run each VP step literally as written — do not improvise or skip."
      - "Use TaskCreate to create one task per VP step. Record pass/fail evidence for each."
      - "If a step fails, enter a fix loop: diagnose, fix, re-verify. Do not move on until it passes."
    issue_handling: "none"
    stop_conditions:
      - tasks_complete
      - committed
      - pushed
    intent_keywords:
      - "verify"
      - "run verification"
      - "execute VP"
      - "verification plan"
    template: "verify.md"
    workflow_prefix: "VF"

  debug:
    name: "Debug"
    description: "Systematic hypothesis-driven debugging with reproduction, root cause analysis, and fix"
    rules:
      - "You are a DEBUGGER. Reproduce first, then hypothesize, then trace systematically."
      - "Do not guess — form hypotheses and test them. Implement the minimal fix, not a rewrite."
    issue_handling: "none"
    stop_conditions:
      - tasks_complete
      - committed
      - pushed
    intent_keywords:
      - "debug"
      - "investigate"
      - "bug"
      - "why is"
      - "broken"
    template: "debug.md"
    workflow_prefix: "DB"
    aliases:
      - "investigate"

  onboard:
    name: "Onboard"
    description: "Configure kata for a new project"
    rules:
      - "You are an ONBOARDING GUIDE. Walk the user through kata setup with an interview."
    stop_conditions: []
    intent_keywords:
      - "onboard"
      - "setup kata"
      - "configure kata"
      - "initialize kata"
    template: "onboard.md"
