name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test src/

      - name: Smoke test binary
        run: |
          # Verify the kata script runs from source via bun
          ./kata help
